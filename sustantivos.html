<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Desafío Gramatical</title>
    <link rel="stylesheet" href="estilos-sustantivos.css?v=2">
</head>
<body>

    <div class="contenedor">
        <h1>📚 Desafío de Sustantivos ✨</h1>
        <p class="subtitulo">Girá la ruleta y poné a prueba tus conocimientos</p>
        
        <div class="ruleta-contenedor">
            <div class="indicador">▼</div>
            <div id="ruleta" class="ruleta">
                <div class="texto-porcion choice">CHOICE</div>
                <div class="texto-porcion verbal">VERBAL</div>
                <div class="texto-porcion vf">V O F</div>
            </div>
            <div class="centro-ruleta"></div>
        </div>

        <button id="boton-girar">¡LANZAR DESAFÍO!</button>
    </div>

    <div id="cuadro-pregunta" class="modal">
        <div class="modal-contenido">
            <p id="texto-pregunta"></p>
            <button id="boton-cerrar">Aceptar</button>
        </div>
    </div>

    <script src="script-sustantivos.js?v=2"></script>
</body>
</html>
