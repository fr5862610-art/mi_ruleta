<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Pedagógica - 5to Grado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Ruleta de Conceptos Curriculares</h1>
        
        <!-- Hemos quitado el panel de configuración para que solo quede la ruleta -->

        <div class="ruleta-container">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="spin">¡GIRAR!</button>
        </div>

        <div id="pregunta-overlay" class="hidden">
            <div class="pregunta-card">
                <h2 id="categoria-nombre"></h2>
                <p id="pregunta-texto"></p>
                <button onclick="cerrarPregunta()" class="btn-close">Continuar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
